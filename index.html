<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>快閃糾團</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.container{max-width:480px;margin:0 auto;padding:16px}

.header{text-align:center;padding:24px 0 16px}
.header h1{font-size:22px;font-weight:700;color:#e74c3c}
.header .event-name{font-size:16px;color:#666;margin-top:4px}
.header .admin-link{font-size:12px;color:#999;margin-top:8px}
.header .admin-link a{color:#999}

.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px;color:#333;border-bottom:2px solid #e74c3c;padding-bottom:8px}

.item-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.item-row:last-child{border-bottom:none}
.item-check{width:20px;height:20px;margin-right:10px;accent-color:#e74c3c;cursor:pointer}
.item-info{flex:1}
.item-name{font-size:15px;font-weight:500}
.item-price{font-size:13px;color:#e74c3c;font-weight:600}
.qty-wrap{display:flex;align-items:center;gap:4px}
.qty-wrap button{width:28px;height:28px;border-radius:6px;border:1px solid #ddd;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333}
.qty-wrap button:active{background:#f0f0f0}
.qty-wrap span{width:28px;text-align:center;font-size:15px;font-weight:600}

.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:13px;color:#666;margin-bottom:4px;font-weight:500}
.input-group input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:none;transition:border-color 0.2s}
.input-group input:focus{border-color:#e74c3c}

.total-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:2px solid #f0f0f0;margin-top:8px}
.total-bar .label{font-size:14px;color:#666}
.total-bar .amount{font-size:20px;font-weight:700;color:#e74c3c}

.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:#e74c3c;color:#fff}
.btn-primary:active{background:#c0392b}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}

.orders-section{margin-top:16px}
.order-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
.order-item:last-child{border-bottom:none}
.order-name{font-weight:600;font-size:14px;color:#333}
.order-detail{font-size:13px;color:#666;margin-top:2px;line-height:1.5}
.order-total{font-size:13px;color:#e74c3c;font-weight:600;margin-top:2px}
.order-paid{display:inline-block;font-size:11px;background:#27ae60;color:#fff;padding:2px 6px;border-radius:4px;margin-left:6px}

.empty{text-align:center;padding:24px;color:#999;font-size:14px}

.loading{text-align:center;padding:40px;color:#999}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:opacity 0.3s;z-index:100}
.toast.show{opacity:1}

.summary-table{width:100%;border-collapse:collapse;font-size:13px}
.summary-table th{text-align:left;padding:8px 6px;border-bottom:2px solid #e74c3c;font-weight:600;font-size:12px;color:#666}
.summary-table td{padding:8px 6px;border-bottom:1px solid #f0f0f0}
.summary-table .total-row td{border-top:2px solid #e74c3c;font-weight:700;color:#e74c3c}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading">載入中...</div>
  <div id="main" style="display:none">
    <div class="header">
      <h1>快閃糾團</h1>
      <div class="event-name" id="eventName"></div>
      <div class="admin-link"><a href="admin.html" id="adminLink">管理者後台</a></div>
    </div>

    <div class="card" id="orderForm">
      <h2>選購品項</h2>
      <div id="itemsList"></div>
      <div class="total-bar">
        <span class="label">小計</span>
        <span class="amount" id="subtotal">$0</span>
      </div>
      <div style="margin-top:16px">
        <div class="input-group">
          <label>你的名字</label>
          <input type="text" id="buyerName" placeholder="輸入你的名字" maxlength="20">
        </div>
        <button class="btn btn-primary" id="submitBtn" onclick="submitOrder()">送出訂單</button>
      </div>
    </div>

    <div class="card orders-section">
      <h2>目前訂單</h2>
      <div id="ordersList" class="empty">目前還沒有訂單</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyD3quPJCOUoUH_Um5UceWXYuUXfRpJEuyo",authDomain:"opencode-sk.firebaseapp.com",projectId:"opencode-sk",storageBucket:"opencode-sk.firebasestorage.app",messagingSenderId:"741268730945",appId:"1:741268730945:web:503cf0dfab0e9100b042c0"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const params=new URLSearchParams(window.location.search);
const eventId=params.get("id");

if(!eventId){
  document.getElementById("loading").innerHTML="無效的連結，請確認網址正確";
}else{
  document.getElementById("adminLink").href="admin.html?id="+eventId;
  loadEvent();
}

let eventData=null;
let items=[];
let selectedItems={};

async function loadEvent(){
  try{
    const doc=await db.collection("events").doc(eventId).get();
    if(!doc.exists){
      document.getElementById("loading").innerHTML="找不到此活動";
      return;
    }
    eventData=doc.data();
    document.getElementById("eventName").textContent=eventData.name;
    document.title=eventData.name+" - 快閃糾團";
    await loadItems();
    listenOrders();
    document.getElementById("loading").style.display="none";
    document.getElementById("main").style.display="block";
  }catch(e){
    document.getElementById("loading").innerHTML="載入失敗："+e.message;
  }
}

async function loadItems(){
  const snap=await db.collection("events").doc(eventId).collection("items").orderBy("createdAt").get();
  items=[];
  snap.forEach(doc=>{
    items.push({id:doc.id,...doc.data()});
  });
  renderItems();
}

function renderItems(){
  const el=document.getElementById("itemsList");
  if(items.length===0){
    el.innerHTML='<div class="empty">管理者尚未新增品項</div>';
    return;
  }
  el.innerHTML=items.map(item=>`
    <div class="item-row">
      <input type="checkbox" class="item-check" data-id="${item.id}" onchange="onItemCheck(this)">
      <div class="item-info">
        <div class="item-name">${esc(item.name)}</div>
        <div class="item-price">$${item.price}</div>
      </div>
      <div class="qty-wrap">
        <button onclick="changeQty('${item.id}',-1)">-</button>
        <span id="qty-${item.id}">0</span>
        <button onclick="changeQty('${item.id}',1)">+</button>
      </div>
    </div>
  `).join("");
}

function onItemCheck(cb){
  const id=cb.dataset.id;
  if(cb.checked){
    if(!selectedItems[id]||selectedItems[id]===0){
      selectedItems[id]=1;
      document.getElementById("qty-"+id).textContent="1";
    }
  }else{
    selectedItems[id]=0;
    document.getElementById("qty-"+id).textContent="0";
  }
  updateTotal();
}

function changeQty(id,delta){
  if(!selectedItems[id])selectedItems[id]=0;
  selectedItems[id]=Math.max(0,selectedItems[id]+delta);
  document.getElementById("qty-"+id).textContent=selectedItems[id];
  const cb=document.querySelector(`.item-check[data-id="${id}"]`);
  if(cb)cb.checked=selectedItems[id]>0;
  updateTotal();
}

function updateTotal(){
  let total=0;
  for(const id in selectedItems){
    const item=items.find(i=>i.id===id);
    if(item)total+=item.price*selectedItems[id];
  }
  document.getElementById("subtotal").textContent="$"+total;
}

async function submitOrder(){
  const name=document.getElementById("buyerName").value.trim();
  if(!name){showToast("請輸入你的名字");return}
  const orderItems=[];
  let total=0;
  for(const id in selectedItems){
    if(selectedItems[id]>0){
      const item=items.find(i=>i.id===id);
      if(item){
        orderItems.push({name:item.name,price:item.price,qty:selectedItems[id]});
        total+=item.price*selectedItems[id];
      }
    }
  }
  if(orderItems.length===0){showToast("請至少選一项商品");return}
  const btn=document.getElementById("submitBtn");
  btn.disabled=true;btn.textContent="送出中...";
  try{
    await db.collection("events").doc(eventId).collection("orders").add({
      buyerName:name,
      items:orderItems,
      totalPrice:total,
      isPaid:false,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast("訂單已送出！");
    selectedItems={};
    renderItems();
    document.getElementById("buyerName").value="";
    document.getElementById("subtotal").textContent="$0";
  }catch(e){
    showToast("送出失敗："+e.message);
  }
  btn.disabled=false;btn.textContent="送出訂單";
}

function listenOrders(){
  db.collection("events").doc(eventId).collection("orders").orderBy("createdAt","desc")
    .onSnapshot(snap=>{
      const el=document.getElementById("ordersList");
      if(snap.empty){el.innerHTML='<div class="empty">目前還沒有訂單</div>';return}
      let html="";
      let grandTotal=0;
      snap.forEach(doc=>{
        const o=doc.data();
        grandTotal+=o.totalPrice;
        const detail=o.items.map(i=>i.name+" x"+i.qty+" ($"+i.price*i.qty+")").join("、");
        const paid=o.isPaid?'<span class="order-paid">已收款</span>':"";
        html+=`<div class="order-item">
          <div class="order-name">${esc(o.buyerName)}${paid}</div>
          <div class="order-detail">${esc(detail)}</div>
          <div class="order-total">合計 $${o.totalPrice}</div>
        </div>`;
      });
      html+=`<table class="summary-table"><tr><td>總計</td><td style="text-align:right">$${grandTotal}</td></tr></table>`;
      el.innerHTML=html;
    });
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
